<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 02 - Exercícios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Aula 02</h1>
        <p>Lista de Exercícios</p>
    </header>
    <main>
        <section>
            <h2>Questões</h2>

            <article id="questao1" class="container-questao">

                <h3>Questão 01 - Multiplicando por 2</h3>

                <div class="container-lista">
                    <ul id="lista-numerica-q1"></ul>
                    <p id="lista-vazia-q1">Lista vazia</p>
                </div>

                <button id="executar-q1">Executar</button>

                <button id="resetar-lista-q1">Resetar lista</button>

            </article>

            <article id="questao2" class="container-questao">
                <h3>Questão 02 - Multiplicando pares por 5</h3>
                <div class="container-lista">
                    <ul id="lista-q2"></ul>
                </div>
                <button id="executar-q2">Executar</button>
                
            </article>

            <article id="questao3" class="container-questao">
                <h3>Questão 03 - Dobrando valores</h3>
                <div class="container-lista">
                    <ul id="lista-q3">
                        <li>3</li>
                        <li>4</li>
                        <li>5</li>
                        <li>8</li>
                        <li>7</li>
                    </ul>
                </div>

                <button id="executar-q3">Dobrar valores</button>
                
            </article>

            <article id="questao4" class="container-questao">
                <h3>Questão 04 - Buscando nome</h3>
                <p id="msg-q3"></p>
                <button id="executar-q4">Buscar Nome</button>
                
                
            </article>

            <article id="questao5" class="container-questao">
                <h3>Questão 05 - Calculando média</h3>
                <button id="executar-q5">Calcular média</button>
                
            </article>
            
        </section>
    </main>
    <script src="index.js"></script>
</body>
</html>
